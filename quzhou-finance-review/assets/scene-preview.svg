      <text x="150" y="70" class="head">五大核心原因</text>
      <text x="42" y="118" class="small">主业持续走弱，缺乏业绩支撑</text>
      <text x="42" y="150" class="small">反复炒作概念，市场信心耗尽</text>
      <text x="42" y="182" class="small">债务、股权双重风险</text>
      <text x="42" y="214" class="small">资金结构恶劣，国资托而不举</text>
    </g>
  </g>
  <g transform="translate(10 658)">
    <g>
      <rect class="card" width="455" height="252" rx="6"/>
      <text x="18" y="35" class="small">01:10-01:20</text>
      <text x="154" y="70" class="head">三、整体总结</text>
      <text x="44" y="124" class="price">2019 <tspan class="up">2.80</tspan> → 2021 <tspan class="up">5.13</tspan></text>
      <text x="44" y="170" class="price">2024 <tspan class="down">1.58</tspan> → 2025 <tspan class="down">6.03</tspan> → 2026 <tspan class="purple">2.76</tspan></text>
      <text x="72" y="220" class="head">反弹即套，阴跌不止</text>
    </g>
    <g transform="translate(480 0)">

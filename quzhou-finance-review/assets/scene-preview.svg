      <text x="58" y="142" class="price"><tspan class="gold">5.51元</tspan> → <tspan class="down">2.76元</tspan></text>
      <path class="line purple" stroke="#9b6de3" d="M54 82l70 38 86 22 76 52 108 28"/>
    </g>
    <g transform="translate(1440 0)">

      <text x="126" y="212" class="small">理性看待　风险自担</text>
    </g>
    <g transform="translate(960 0)">
      <rect class="card" width="455" height="252" rx="6"/>
      <text x="18" y="35" class="small">01:25-01:28</text>
      <text x="138" y="104" font-size="54" font-weight="900" fill="#c9a24d">感谢观看</text>
      <text x="86" y="176" class="big">点赞　关注　收藏</text>
    </g>
    <g transform="translate(1440 0)">
      <rect class="card" width="455" height="252" rx="6"/>
      <text x="18" y="35" class="small">01:28-01:30</text>
      <text x="72" y="104" font-size="42" font-weight="900" fill="#c9a24d">更多深度复盘 敬请期待</text>
      <rect x="170" y="150" width="116" height="72" rx="10" fill="none" stroke="#f1f4f8" stroke-width="3"/>
      <path d="M216 168l36 18-36 18z" fill="#f1f4f8"/>
    </g>
  </g>
  <text x="320" y="1036" fill="#1a1d22" font-size="24">视频时长：约90秒　|　适合平台：抖音 / 视频号 / B站 / 今日头条　|　建议分辨率：1080P（16:9）</text>
